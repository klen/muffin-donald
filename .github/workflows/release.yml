name: release

on:
  workflow_run:
    workflows: [tests]
    branches: [main]
    types: [completed]

jobs:

  build:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
    - uses: actions/checkout@main

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Build and publish
      env:
        UV_PUBLISH_TOKEN: ${{ secrets.pypi }}
      run: |
        uv build
        uv publish
